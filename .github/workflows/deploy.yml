name: Deploy ShoftAfrica App

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SHOFT_AFRICA_APPS_CATALOGUE_IP }}
          username: ${{ secrets.SHOFT_AFRICA_APPS_CATALOGUE_USERNAME }}
          key: ${{ secrets.SHOFT_AFRICA_APPS_CATALOGUE_SSH_KEY }}
          script: |
            cd /var/www/ShoftAfricaAppsCatalogue
            git pull origin main
            docker build -t shoft-app .
            docker stop shoft-app-container || true
            docker rm shoft-app-container || true
            docker run -d --name shoft-app-container -p 3000:80 shoft-app
